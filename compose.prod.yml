# FinancePY — Producción en VM (Google Compute Engine) + Supabase Postgres
# Datos críticos viven en Supabase → la VM es descartable.
# Uso:
#   cp .env.production.example .env && editar valores
#   docker compose -f compose.prod.yml up -d --build

x-rails-env: &rails_env
  SECRET_KEY_BASE: ${SECRET_KEY_BASE:?SECRET_KEY_BASE requerido en .env}
  DATABASE_URL: ${DATABASE_URL:?DATABASE_URL requerido en .env (Supabase session pooler)}
  SELF_HOSTED: "true"
  RAILS_FORCE_SSL: "false"
  RAILS_ASSUME_SSL: "true"
  APP_DOMAIN: ${APP_DOMAIN:-finance.cd-co.com.py}
  PRODUCT_NAME: ${PRODUCT_NAME:-FinancePY}
  BRAND_NAME: ${BRAND_NAME:-CD & Co.}
  REDIS_URL: redis://redis:6379/1
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  # AI Assistant vía NVIDIA API Catalog (endpoint OpenAI-compatible, modelos open-weight)
  OPENAI_ACCESS_TOKEN: ${OPENAI_ACCESS_TOKEN:-}
  OPENAI_URI_BASE: ${OPENAI_URI_BASE:-}
  OPENAI_MODEL: ${OPENAI_MODEL:-}

services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - web
    networks:
      - financespy_net

  web:
    build: .
    volumes:
      - app-storage:/rails/storage
    restart: unless-stopped
    environment:
      <<: *rails_env
    depends_on:
      redis:
        condition: service_healthy
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - financespy_net

  worker:
    build: .
    command: bundle exec sidekiq
    volumes:
      - app-storage:/rails/storage
    restart: unless-stopped
    environment:
      <<: *rails_env
    depends_on:
      redis:
        condition: service_healthy
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - financespy_net

  redis:
    image: redis:latest
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - financespy_net

volumes:
  app-storage:
  redis-data:
  caddy-data:
  caddy-config:

networks:
  financespy_net:
    driver: bridge
